<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Business Bot</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #343541;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        .chat-container {
            width: 100%;
            max-width: 700px;
            height: 85vh;
            background: #444654;
            display: flex;
            flex-direction: column;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        #chatbox {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }
        .message {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 8px;
            line-height: 1.5;
            max-width: 85%;
        }
        .user-msg {
            background-color: #343541;
            margin-left: auto;
            border: 1px solid #565869;
            color: #ececf1;
        }
        .bot-msg {
            background-color: #444654;
            margin-right: auto;
            color: #d1d1d6;
        }
        .input-area {
            padding: 20px;
            background: #343541;
            display: flex;
            gap: 10px;
            border-top: 1px solid #565869;
        }
        #userInput {
            flex: 1;
            background: #40414f;
            border: 1px solid #565869;
            border-radius: 5px;
            padding: 12px 15px;
            color: white;
            outline: none;
            font-size: 16px;
        }
        #userInput:focus {
            border-color: #10a37f;
        }
        button {
            background: #10a37f;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background: #1a7f64;
        }
        #chatbox::-webkit-scrollbar {
            width: 6px;
        }
        #chatbox::-webkit-scrollbar-thumb {
            background: #565869;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <h3 style="text-align: center; padding: 10px; margin: 0; background: #202123;">Business AI Assistant</h3>
    
    <div id="chatbox">
        <div class="message bot-msg"><b>Bot:</b> Hello! How can I assist you today?</div>
    </div>

    <div class="input-area">
        <input id="userInput" type="text" placeholder="Send a message..." autocomplete="off">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    let inputField = document.getElementById("userInput");
    inputField.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            sendMessage();
        }
    });

    function sendMessage() {
        let userText = inputField.value;
        if (userText.trim() === "") return;
        let chatbox = document.getElementById("chatbox");
        chatbox.innerHTML += "<div class='message user-msg'><b>You:</b> " + userText + "</div>";
        inputField.value = "";
        chatbox.scrollTop = chatbox.scrollHeight;
        fetch("/get?msg=" + encodeURIComponent(userText))
        .then(response => response.text())
        .then(data => {
            chatbox.innerHTML += "<div class='message bot-msg'><b>Bot:</b> " + data + "</div>";
            chatbox.scrollTop = chatbox.scrollHeight;
        });
    }
</script>

</body>
</html>
