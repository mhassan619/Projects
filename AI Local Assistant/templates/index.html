<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ bot_name }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <div class="app" id="app">

    <!-- ====================== SIDEBAR ====================== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <button class="new-chat-btn" id="newChatBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          <span>New chat</span>
        </button>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-title">Recents</div>
        <div class="chat-list" id="chatList">
          <div class="chat-list-empty">No saved chats yet</div>
        </div>
      </div>

      <div class="sidebar-bottom">
        <div class="user-pill">
          <div class="avatar">H</div>
          <div class="user-meta">
            <div class="user-name">Hassan</div>
            <div class="user-plan">CS · AI Automation</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- mobile backdrop -->
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <!-- ====================== MAIN ====================== -->
    <main class="main">
      <header class="topbar">
        <button class="icon-btn sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
        <div class="model-badge">
          <span class="model-dot"></span>
          <span class="model-name">{{ bot_name }}</span>
          <span class="model-divider">·</span>
          <span class="model-version">{{ model }}</span>
        </div>
        <div class="topbar-actions">
          <button class="icon-btn" id="saveBtn" title="Save chat to JSON">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
              <polyline points="17 21 17 13 7 13 7 21"></polyline>
              <polyline points="7 3 7 8 15 8"></polyline>
            </svg>
          </button>
        </div>
      </header>

      <div class="content">
        <!-- welcome screen -->
        <div class="welcome" id="welcome">
          <div class="welcome-logo">
            <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a4 4 0 0 0-4 4v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2h-2V6a4 4 0 0 0-4-4z"></path>
              <circle cx="12" cy="14" r="2.5"></circle>
            </svg>
          </div>
          <h1 class="welcome-title">{{ bot_name }}</h1>
          <p class="welcome-sub">How can I help you today?</p>

          <div class="suggestions">
            <button class="suggestion" data-prompt="Explain async/await in Python with a simple example.">
              <span class="suggestion-title">Explain async/await</span>
              <span class="suggestion-sub">A simple Python example</span>
            </button>
            <button class="suggestion" data-prompt="Write a Flask route that streams responses to the browser using SSE.">
              <span class="suggestion-title">Flask streaming</span>
              <span class="suggestion-sub">Server-Sent Events example</span>
            </button>
            <button class="suggestion" data-prompt="Give me a 7-day roadmap to learn AI Automation Engineering.">
              <span class="suggestion-title">AI Automation roadmap</span>
              <span class="suggestion-sub">7-day beginner plan</span>
            </button>
            <button class="suggestion" data-prompt="What's the difference between Ollama, llama.cpp and vLLM?">
              <span class="suggestion-title">Local LLM tools</span>
              <span class="suggestion-sub">Ollama vs llama.cpp vs vLLM</span>
            </button>
          </div>
        </div>

        <!-- chat list (hidden until first message) -->
        <div class="messages" id="messages" hidden></div>
      </div>

      <!-- ====================== COMPOSER ====================== -->
      <div class="composer-wrap">
        <form class="composer" id="composer" autocomplete="off">
          <div class="composer-inner">
            <textarea
              id="input"
              rows="1"
              placeholder="Reply to {{ bot_name }}…"
              autocomplete="off"
            ></textarea>
            <button type="submit" class="send-btn" id="sendBtn" aria-label="Send">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="19" x2="12" y2="5"></line>
                <polyline points="5 12 12 5 19 12"></polyline>
              </svg>
            </button>
          </div>
          <div class="composer-hint">Hassan's AI can make mistakes. Verify important info.</div>
        </form>
      </div>
    </main>
  </div>

  <!-- Markdown + sanitiser (CDN, no build step) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
